<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>Hidden treasure</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Caveat:wght@400..700&display=swap');

body {

    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Amatic SC", sans-serif;
    font-weight: 700;
    touch-action: none;
    background-color: brown;

    /* background-image: url(back2.jfif); /* your image */ */
    /* background-size: cover;        /* fills screen */ */
    /* background-position: center;   /* keeps it centered */ */
    /* background-repeat: no-repeat;  /* no tiling */ */
    /* background-attachment: fixed;  /* subtle parallax effect */ */
    overflow: hidden;
}
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(76, 41, 45, 0.3); /* soft pink overlay */
    z-index: -1;
}

.container {
    position: relative;
    width: 350px;
    height: 450px;
    margin: 50px auto;
}

.photo {
    width: 100%;
    height: 100%;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* CHIT STYLE (IMAGE + TEXT) */
.note {
    position: absolute;
    width: 430px;
    height: 230px;
    cursor: grab;
    border-radius: 100px;
}

.note img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
}

.note-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80%;
    text-align: center;
    font-size: 14px;
    color: #333;
    pointer-events: none;
}

/* Positions */
.note1 {
     top: 0px;
     left: 30px;
     transform: rotate(-8deg); 
}
.note2 {
     top:60px;
    right: 80px;
     transform: rotate(-50deg); 

    }
.note3 {
     bottom: -10px;
      left: 0px; 
     transform: rotate(30deg); 

    }
.note4 { 
    bottom: 100px;
     right: -30px;
     }



     /* 📱 MOBILE RESPONSIVE */
@media (max-width: 450px) {

    body {
        overflow: hidden;
    }


    .container {
        width: 60%;
        height: 40vh;
        margin: 50% 20% 30% 20%;
    }

    .photo {
        border-radius: 15px;
    }

    /* Smaller chits */
    .note {
        width: 300px;
        height: 120px;
        /* background-color: aqua; */
    }

    .note-text {
        font-size: 11px;
    }

    /* Reposition notes nicely for mobile */
    .note1 {
        top: -10px;
        left: 0px;
        transform: rotate(-6deg);
    }

    .note2 {
        top: 40px;
        right: 10px;
        transform: rotate(-20deg);
    }

    .note3 {
        bottom: -10px;
        left: 5px;
        transform: rotate(25deg);
    }

    .note4 {
        bottom: 60px;
        right: -25px;
        transform: rotate(8deg);
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="photo">
        <img src="extremely-beautiful.jpg" alt="Her Photo">
    </div>

    <!-- IMAGE CHITS -->
    <div class="note note1">
        <img src="paper.png">
        <div class="note-text">arey last chit hataiye to hidden treasure dekhen na hum? arey ye to waqai hidden treasure hy omggg🤭</div>
    </div>

    <div class="note note2">
        <img src="paper.png">
        <div class="note-text">arey ap yahan kya kar rahi ma'am?🤭</div>
    </div>

    <div class="note note3">
        <img src="paper.png">
        <div class="note-text">wait wait ye to gorgeous diva the queen kanza hy</div>
    </div>

    <div class="note note4">
        <img src="paper.png">
        <div class="note-text">arey ye niche mujhe kuch beautiful beautiful sa koi nazar aa raha hy, paper to hatao ye</div>
    </div>

</div>

<script>
const notes = document.querySelectorAll('.note');

notes.forEach(note => {
    let isDragging = false;
    let offsetX, offsetY;

    // Mouse
    note.addEventListener('mousedown', (e) => {
        isDragging = true;
        offsetX = e.clientX - note.offsetLeft;
        offsetY = e.clientY - note.offsetTop;
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        note.style.left = (e.clientX - offsetX) + 'px';
        note.style.top = (e.clientY - offsetY) + 'px';
    });

    document.addEventListener('mouseup', () => {
        isDragging = false;
    });

    // Touch (📱)
    note.addEventListener('touchstart', (e) => {
        isDragging = true;
        const touch = e.touches[0];
        offsetX = touch.clientX - note.offsetLeft;
        offsetY = touch.clientY - note.offsetTop;
    });

    document.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const touch = e.touches[0];
        note.style.left = (touch.clientX - offsetX) + 'px';
        note.style.top = (touch.clientY - offsetY) + 'px';
    });

    document.addEventListener('touchend', () => {
        isDragging = false;
    });
});
</script>

</body>
</html>
